# Комиссии и коэффициенты

# Комиссия дилера
dealer_commission:
  Китай:
    type: percent
    value: 0.15
  Корея:
    type: fixed
    value: 2500
    currency: USD

# Комиссия компании CarStar
carstar_commission:
  Китай: 16000
  Корея: 6000

# Страхование (необязательное)
insurance:
  default_percent: 0.002
  vladivostok_exempt: true

# Налоги
taxes:
  vat_import:
    individual: 0
    legal: 0.20
    kyrgyzstan_legal: 0.12

  vat_sale: 0.20           # НДС при продаже
  profit_tax: 0.20         # Налог на прибыль
  social_tax: 0.02         # НСП 2%

# Маржинальность
markup:
  default: 0.20            # 20% наценка от себестоимости

# Таможенные сборы
customs_fees:
  clearance: 0.0025        # 0.25% за таможенное оформление
  postal: 500              # почтовый сбор (при необходимости)