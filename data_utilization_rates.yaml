# Коэффициенты утилизационного сбора для легковых автомобилей (категория M1)
# Базовая ставка: 20 000 ₽
# Источник: Постановление Правительства РФ от 01.11.2025 № 1713
# Действует с 1 декабря 2025 года

base_rate: 20000

# ============================================================
# ДЛЯ ФИЗИЧЕСКИХ ЛИЦ (личное пользование)
# ============================================================
individuals:
  description: "Льготные коэффициенты сохраняются только для авто мощностью ДО 160 л.с."
  base_rate: 20000
  
  categories:
    # Для автомобилей мощностью до 160 л.с. - льготные коэффициенты (старые)
    - name: "льготная категория (до 160 л.с.)"
      max_hp: 160
      is_electric: false
      new: 0.17
      old: 0.26
    
    # Для автомобилей мощностью СВЫШЕ 160 л.с. - коммерческие коэффициенты
    - name: "коммерческая категория (свыше 160 л.с.)"
      min_hp: 160.01
      is_electric: false
      new: 89.73
      old: 137.36
    
    # Электромобили - отдельно (тоже зависят от мощности)
    - name: "электромобили"
      is_electric: true
      # До 80 л.с. (58.84 кВт) - льготные
      - max_hp: 80
        new: 0.17
        old: 0.26
      # Свыше 80 л.с. - коммерческие
      - min_hp: 80.01
        new: 89.73
        old: 137.36

# ============================================================
